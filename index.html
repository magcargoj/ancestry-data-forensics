<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Wood Family History</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="A digital archive of the ancestors, stories, and legacies of the Wood and Brooks families.">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  
  <!-- Modern Simple Theme -->
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-simple.css">
  
  <style>
    :root {
      --theme-color: #2c3e50;
      --base-font-size: 16px;
      --content-max-width: 60em;
    }
    
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    /* Cards for list items */
    .markdown-section table {
      display: table;
      width: 100%;
      margin-bottom: 20px;
    }

    /* Fix sidebar image/logo */
    .sidebar-nav img {
      width: 80px;
    }
  </style>
</head>
<body>
  <div id="app">Loading our history...</div>
  <script>
    window.$docsify = {
      name: 'Wood Family History',
      repo: 'https://github.com/magcargoj/wood-family-history',
      loadSidebar: true,
      coverpage: true,
      auto2top: true,
      subMaxLevel: 2,
      search: 'auto',
      plugins: [
        function(hook, vm) {
          // Hook to convert [[Wikilinks]] before processing markdown
          hook.beforeEach(function(content) {
            return content.replace(/\[\[([^\]|]+)(?:\|([^\]]+))?\]\]/g, function(match, target, label) {
              const path = target.replace(/ /g, '_');
              const display = label || target;
              return `[${display}](/#/${path})`;
            });
          });
        }
      ]
    }
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-themeable@0/dist/js/docsify-themeable.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-copy-code/dist/docsify-copy-code.min.js"></script>
</body>
</html>
