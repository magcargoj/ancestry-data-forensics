<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Wood Family History</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  
  <!-- Minimalist Theme -->
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/pure.css">
  
  <style>
    :root {
      --theme-color: #333;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: #333;
      line-height: 1.6;
    }

    .sidebar {
      background-color: #fff;
      border-right: 1px solid #eee;
    }

    .markdown-section {
      max-width: 700px;
      margin: 0 auto;
      padding: 2rem 15px;
    }

    /* Clean Tables */
    table {
      border-collapse: collapse;
      margin: 1rem 0;
      width: 100%;
    }
    th, td {
      border: 1px solid #eee;
      padding: 10px;
      text-align: left;
    }
    th {
      background-color: #f9f9f9;
    }

    /* Hide unnecessary UI elements */
    .app-nav { display: none; }
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    window.$docsify = {
      name: 'Wood Family History',
      loadSidebar: true,
      auto2top: true,
      subMaxLevel: 1,
      search: 'auto',
      plugins: [
        function(hook, vm) {
          hook.beforeEach(function(content) {
            // Handle [[Wikilinks]]
            return content.replace(/\[\[([^\]|]+)(?:\|([^\]]+))?\]\]/g, function(match, target, label) {
              const path = target.replace(/ /g, '_');
              const display = label || target;
              return `[${display}](/#/${path})`;
            });
          });
        }
      ]
    }
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
</body>
</html>
